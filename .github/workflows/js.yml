name: JS

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/js.yml'
  pull_request:
    paths:
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/js.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint JS
        run: npm run lint:js

      - name: Lint styles
        run: npm run lint:css

      - name: Build
        run: npm run build
