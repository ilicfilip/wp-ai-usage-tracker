name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  phpunit:
    name: 'PHPUnit: PHP ${{ matrix.php_version }}'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php_version: ['7.4', '8.3']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_ai_rl_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php_version }}
          extensions: mysqli
          coverage: none
          tools: composer

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          custom-cache-suffix: $(date -u "+%Y-%m")

      - name: Install the WordPress test suite
        run: |
          # The mysql service already created the DB (MYSQL_DATABASE), so the
          # final arg skips DB creation. Root has a real password here — passing
          # a non-empty value also avoids positional-arg shifting.
          bash bin/install-wp-tests.sh wp_ai_rl_tests root root 127.0.0.1:3306 latest true
          # Fail loudly here if the test library did not land, instead of letting
          # the PHPUnit step fail with a confusing "functions.php not found".
          test -f /tmp/wordpress-tests-lib/includes/functions.php

      - name: Run PHPUnit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
        run: composer test
